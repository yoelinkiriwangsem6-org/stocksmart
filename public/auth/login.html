<!DOCTYPE html>
<html lang="id">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Login — StockSmart</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
  <link href="https://cdn.jsdelivr.net/npm/@tabler/icons-webfont@3.19.0/dist/tabler-icons.min.css" rel="stylesheet">
  <link
    href="https://fonts.googleapis.com/css2?family=Sora:wght@400;500;600;700&family=DM+Sans:wght@400;500&display=swap"
    rel="stylesheet">
  <link rel="stylesheet" href="/css/style-new.css">
</head>

<body
  style="background: linear-gradient(135deg, #0f172a 0%, #1e3a8a 100%); min-height:100vh; display:flex; align-items:center; justify-content:center; margin:0;">

  <div
    style="background:#fff; border-radius:20px; padding:42px 40px; width:100%; max-width:420px; box-shadow: 0 24px 60px rgba(0,0,0,0.35);">

    <!-- LOGO -->
    <div style="display:flex; align-items:center; gap:10px; margin-bottom:8px;">
      <i class="ti ti-trending-up" style="font-size:30px; color:#2563eb;"></i>
      <span style="font-family:'Sora',sans-serif; font-size:22px; font-weight:700; color:#1e293b;">StockSmart</span>
    </div>
    <p style="color:#64748b; font-size:14px; margin-bottom:28px;">Sistem Rekomendasi Saham</p>

    <h2 style="font-family:'Sora',sans-serif; font-size:20px; font-weight:700; margin-bottom:20px; color:#1e293b;">Masuk
      ke Akun</h2>

    <div id="errMsg"
      style="display:none; background:#fee2e2; border:1px solid #fca5a5; border-radius:8px; padding:10px 14px; color:#b91c1c; font-size:13px; margin-bottom:16px;">
    </div>

    <div style="margin-bottom:14px;">
      <label style="font-size:13px; font-weight:500; color:#1e293b; margin-bottom:5px; display:block;">Username</label>
      <input type="text" id="username" class="form-control" placeholder="Masukkan username"
        style="border:1px solid #e5e7eb; border-radius:8px; padding:10px 12px; font-size:14px;">
    </div>

    <div style="margin-bottom:20px;">
      <label style="font-size:13px; font-weight:500; color:#1e293b; margin-bottom:5px; display:block;">Password</label>
      <input type="password" id="password" class="form-control" placeholder="Masukkan password"
        style="border:1px solid #e5e7eb; border-radius:8px; padding:10px 12px; font-size:14px;"
        onkeydown="if(event.key==='Enter') login()">
    </div>

    <button onclick="login()"
      style="width:100%; background:#2563eb; color:#fff; border:none; border-radius:8px; padding:12px; font-size:15px; font-weight:600; cursor:pointer; font-family:'Sora',sans-serif; transition: background 0.15s;"
      onmouseover="this.style.background='#1d4ed8'" onmouseout="this.style.background='#2563eb'">
      <i class="ti ti-login"></i> Masuk
    </button>

    <div style="text-align:center; margin-top:18px; font-size:13px; color:#64748b;">
      Belum punya akun? <a href="/auth/register.html" style="color:#2563eb; font-weight:600;">Daftar disini</a>
    </div>
  </div>

  <script>
    async function login() {
      const username = document.getElementById('username').value.trim();
      const password = document.getElementById('password').value;
      const errEl = document.getElementById('errMsg');

      if (!username || !password) {
        errEl.textContent = 'Username dan password wajib diisi!';
        errEl.style.display = 'block'; return;
      }

      try {
        const res = await fetch('/users/login', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ username, password })
        });
        const data = await res.json();

        if (data.success) {

          localStorage.setItem(
            'user',
            JSON.stringify(data)
          );

          // CEK ROLE
          if (data.role === "admin") {

            window.location.href =
              "/admin/admin.html";

          }

          else {

            window.location.href =
              "/users/dashboard.html";

          }

        }
        else {

          errEl.textContent =
            data.message;

          errEl.style.display =
            'block';

        }
      } catch (e) {
        errEl.textContent = 'Gagal terhubung ke server. Pastikan server berjalan.';
        errEl.style.display = 'block';
      }
    }
  </script>
</body>

</html>
