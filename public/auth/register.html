<!DOCTYPE html>
<html lang="id">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Register — SPK TOPSIS</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/@tabler/icons-webfont@3.19.0/dist/tabler-icons.min.css" rel="stylesheet">
    <link
        href="https://fonts.googleapis.com/css2?family=Sora:wght@400;500;600;700&family=DM+Sans:wght@400;500&display=swap"
        rel="stylesheet">
    <link rel="stylesheet" href="/css/style-new.css">
    <style>
        body {
            background: linear-gradient(135deg, #0f172a 0%, #1e3a8a 100%);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            margin: 0;
            font-family: 'DM Sans', sans-serif;
        }

        .auth-card {
            background: #fff;
            border-radius: 20px;
            padding: 42px 40px;
            width: 100%;
            max-width: 440px;
            box-shadow: 0 24px 60px rgba(0, 0, 0, 0.35);
        }

        .field-group {
            margin-bottom: 16px;
        }

        .field-label {
            font-size: 13px;
            font-weight: 500;
            color: #1e293b;
            margin-bottom: 5px;
            display: block;
        }

        .field-input {
            width: 100%;
            border: 1px solid #e5e7eb;
            border-radius: 8px;
            padding: 10px 12px;
            font-size: 14px;
            font-family: 'DM Sans', sans-serif;
            transition: border-color 0.15s, box-shadow 0.15s;
            outline: none;
        }

        .field-input:focus {
            border-color: #2563eb;
            box-shadow: 0 0 0 3px rgba(37, 99, 235, 0.12);
        }

        .field-input.error {
            border-color: #ef4444;
        }

        .field-input.success {
            border-color: #16a34a;
        }

        .field-hint {
            font-size: 12px;
            color: #94a3b8;
            margin-top: 4px;
        }

        .field-err {
            font-size: 12px;
            color: #ef4444;
            margin-top: 4px;
            display: none;
        }

        .strength-bar-wrap {
            height: 5px;
            background: #f1f5f9;
            border-radius: 999px;
            margin-top: 6px;
            overflow: hidden;
        }

        .strength-bar {
            height: 5px;
            border-radius: 999px;
            transition: width 0.3s, background 0.3s;
            width: 0%;
        }

        .strength-label {
            font-size: 11px;
            margin-top: 3px;
            font-weight: 500;
        }

        .btn-register {
            width: 100%;
            background: #2563eb;
            color: #fff;
            border: none;
            border-radius: 8px;
            padding: 12px;
            font-size: 15px;
            font-weight: 600;
            cursor: pointer;
            font-family: 'Sora', sans-serif;
            transition: background 0.15s, transform 0.1s;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
        }

        .btn-register:hover:not(:disabled) {
            background: #1d4ed8;
        }

        .btn-register:active:not(:disabled) {
            transform: scale(0.98);
        }

        .btn-register:disabled {
            background: #93c5fd;
            cursor: not-allowed;
        }

        .alert-box {
            border-radius: 8px;
            padding: 11px 14px;
            font-size: 13px;
            margin-bottom: 16px;
            display: none;
            align-items: center;
            gap: 8px;
        }

        .alert-box.error {
            background: #fee2e2;
            border: 1px solid #fca5a5;
            color: #b91c1c;
            display: flex;
        }

        .alert-box.success {
            background: #dcfce7;
            border: 1px solid #86efac;
            color: #15803d;
            display: flex;
        }

        .step-dots {
            display: flex;
            gap: 6px;
            margin-bottom: 20px;
        }

        .step-dot {
            height: 4px;
            border-radius: 999px;
            transition: width 0.3s, background 0.3s;
        }
    </style>
</head>

<body>

    <div class="auth-card">

        <!-- LOGO -->
        <div style="display:flex; align-items:center; gap:10px; margin-bottom:6px;">
            <i class="ti ti-trending-up" style="font-size:30px; color:#2563eb;"></i>
            <span style="font-family:'Sora',sans-serif; font-size:22px; font-weight:700; color:#1e293b;">StockSPK</span>
        </div>
        <p style="color:#64748b; font-size:14px; margin-bottom:24px;">Sistem Pendukung Keputusan Pemilihan Saham</p>

        <h2 style="font-family:'Sora',sans-serif; font-size:20px; font-weight:700; margin-bottom:20px; color:#1e293b;">
            Buat Akun Baru</h2>

        <!-- ALERT BOX -->
        <div class="alert-box" id="alertBox">
            <i class="ti ti-info-circle" style="font-size:18px; flex-shrink:0;"></i>
            <span id="alertMsg"></span>
        </div>

        <!-- USERNAME -->
        <div class="field-group">
            <label class="field-label" for="username">
                Username <span style="color:#ef4444;">*</span>
            </label>
            <input type="text" id="username" class="field-input" placeholder="Contoh: john_doe" autocomplete="username"
                oninput="validateUsername()">
            <div class="field-err" id="err_username"></div>
            <div class="field-hint">Hanya huruf, angka, dan underscore. Min. 3 karakter.</div>
        </div>

        <!-- PASSWORD -->
        <div class="field-group">
            <label class="field-label" for="password">
                Password <span style="color:#ef4444;">*</span>
            </label>
            <div style="position:relative;">
                <input type="password" id="password" class="field-input" placeholder="Min. 6 karakter"
                    autocomplete="new-password" oninput="validatePassword()" style="padding-right: 42px;">
                <button type="button" onclick="togglePass('password', 'eyeIcon1')"
                    style="position:absolute; right:10px; top:50%; transform:translateY(-50%); background:none; border:none; cursor:pointer; color:#94a3b8; font-size:18px; display:flex; align-items:center;"
                    aria-label="Tampilkan/sembunyikan password">
                    <i class="ti ti-eye" id="eyeIcon1"></i>
                </button>
            </div>
            <!-- Strength bar -->
            <div class="strength-bar-wrap">
                <div class="strength-bar" id="strengthBar"></div>
            </div>
            <div class="strength-label" id="strengthLabel" style="color:#94a3b8;"></div>
            <div class="field-err" id="err_password"></div>
        </div>

        <!-- KONFIRMASI PASSWORD -->
        <div class="field-group">
            <label class="field-label" for="konfirmasi">
                Konfirmasi Password <span style="color:#ef4444;">*</span>
            </label>
            <div style="position:relative;">
                <input type="password" id="konfirmasi" class="field-input" placeholder="Ulangi password"
                    autocomplete="new-password" oninput="validateKonfirmasi()" style="padding-right: 42px;">
                <button type="button" onclick="togglePass('konfirmasi', 'eyeIcon2')"
                    style="position:absolute; right:10px; top:50%; transform:translateY(-50%); background:none; border:none; cursor:pointer; color:#94a3b8; font-size:18px; display:flex; align-items:center;"
                    aria-label="Tampilkan/sembunyikan konfirmasi">
                    <i class="ti ti-eye" id="eyeIcon2"></i>
                </button>
            </div>
            <div class="field-err" id="err_konfirmasi"></div>
        </div>

        <!-- TIPE PENGGUNA -->
        <div class="field-group" style="margin-bottom:22px;">
            <label class="field-label">Tipe Pengguna</label>
            <select id="tipe_pengguna" class="field-input">
                <option value="user">User (Pengguna Biasa)</option>
                <option value="admin">Admin</option>
            </select>
            <div class="field-hint">Admin dapat mengelola seluruh data saham.</div>
        </div>

        <!-- BUTTON -->
        <button class="btn-register" id="btnRegister" onclick="doRegister()">
            <i class="ti ti-user-plus"></i> Daftar Sekarang
        </button>

        <div style="text-align:center; margin-top:18px; font-size:13px; color:#64748b;">
            Sudah punya akun?
            <a href="/auth/login.html" style="color:#2563eb; font-weight:600;">Masuk disini</a>
        </div>

    </div>

    <script>
        // ==========================================
        // TOGGLE PASSWORD VISIBILITY
        // ==========================================
        function togglePass(inputId, iconId) {
            const input = document.getElementById(inputId);
            const icon = document.getElementById(iconId);
            if (input.type === 'password') {
                input.type = 'text';
                icon.className = 'ti ti-eye-off';
            } else {
                input.type = 'password';
                icon.className = 'ti ti-eye';
            }
        }

        // ==========================================
        // VALIDASI USERNAME
        // ==========================================
        function validateUsername() {
            const val = document.getElementById('username').value.trim();
            const input = document.getElementById('username');
            const err = document.getElementById('err_username');

            if (!val) {
                setFieldState(input, err, 'error', 'Username tidak boleh kosong.');
                return false;
            }
            if (val.length < 3) {
                setFieldState(input, err, 'error', 'Username minimal 3 karakter.');
                return false;
            }
            if (!/^[a-zA-Z0-9_]+$/.test(val)) {
                setFieldState(input, err, 'error', 'Hanya huruf, angka, dan underscore (_).');
                return false;
            }
            setFieldState(input, err, 'success', '');
            return true;
        }

        // ==========================================
        // VALIDASI PASSWORD + STRENGTH
        // ==========================================
        function validatePassword() {
            const val = document.getElementById('password').value;
            const input = document.getElementById('password');
            const err = document.getElementById('err_password');

            // Strength
            const strength = getStrength(val);
            const bar = document.getElementById('strengthBar');
            const label = document.getElementById('strengthLabel');
            const levels = [
                { pct: 0, color: '', text: '' },
                { pct: 25, color: '#ef4444', text: 'Sangat lemah' },
                { pct: 50, color: '#f97316', text: 'Lemah' },
                { pct: 75, color: '#eab308', text: 'Cukup kuat' },
                { pct: 100, color: '#16a34a', text: 'Kuat' },
            ];
            const lv = levels[strength];
            bar.style.width = lv.pct + '%';
            bar.style.background = lv.color;
            label.textContent = lv.text;
            label.style.color = lv.color;

            if (!val) {
                setFieldState(input, err, 'error', 'Password tidak boleh kosong.');
                return false;
            }
            if (val.length < 6) {
                setFieldState(input, err, 'error', 'Password minimal 6 karakter.');
                return false;
            }
            setFieldState(input, err, 'success', '');

            // Update konfirmasi if already filled
            if (document.getElementById('konfirmasi').value) validateKonfirmasi();
            return true;
        }

        function getStrength(pw) {
            if (!pw) return 0;
            let score = 0;
            if (pw.length >= 6) score++;
            if (pw.length >= 10) score++;
            if (/[A-Z]/.test(pw) && /[a-z]/.test(pw)) score++;
            if (/[0-9]/.test(pw)) score++;
            if (/[^A-Za-z0-9]/.test(pw)) score++;
            return Math.min(4, score);
        }

        // ==========================================
        // VALIDASI KONFIRMASI
        // ==========================================
        function validateKonfirmasi() {
            const pw = document.getElementById('password').value;
            const conf = document.getElementById('konfirmasi').value;
            const input = document.getElementById('konfirmasi');
            const err = document.getElementById('err_konfirmasi');

            if (!conf) {
                setFieldState(input, err, 'error', 'Konfirmasi password tidak boleh kosong.');
                return false;
            }
            if (pw !== conf) {
                setFieldState(input, err, 'error', 'Password tidak cocok.');
                return false;
            }
            setFieldState(input, err, 'success', '');
            return true;
        }

        // ==========================================
        // HELPER FIELD STATE
        // ==========================================
        function setFieldState(input, errEl, state, msg) {
            input.classList.remove('error', 'success');
            if (state === 'error') {
                input.classList.add('error');
                errEl.textContent = msg;
                errEl.style.display = 'block';
            } else {
                input.classList.add('success');
                errEl.style.display = 'none';
            }
        }

        // ==========================================
        // SHOW ALERT
        // ==========================================
        function showAlert(type, msg) {
            const box = document.getElementById('alertBox');
            const msgEl = document.getElementById('alertMsg');
            box.className = 'alert-box ' + type;
            msgEl.textContent = msg;
            box.style.display = 'flex';
            box.scrollIntoView({ behavior: 'smooth', block: 'nearest' });
        }

        function hideAlert() {
            document.getElementById('alertBox').style.display = 'none';
        }

        // ==========================================
        // REGISTER
        // ==========================================
        async function doRegister() {
            hideAlert();

            const okUser = validateUsername();
            const okPass = validatePassword();
            const okConf = validateKonfirmasi();

            if (!okUser || !okPass || !okConf) return;

            const username = document.getElementById('username').value.trim();
            const password = document.getElementById('password').value;
            const tipe_pengguna = document.getElementById('tipe_pengguna').value;

            const btn = document.getElementById('btnRegister');
            btn.disabled = true;
            btn.innerHTML = '<i class="ti ti-loader-2" style="animation:spin 1s linear infinite;"></i> Mendaftarkan...';

            try {
                const res = await fetch('/users/register', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ username, password, tipe_pengguna })
                });

                const data = await res.json();

                if (data.success) {
                    showAlert('success', 'Pendaftaran berhasil! Mengalihkan ke halaman login...');
                    btn.innerHTML = '<i class="ti ti-check"></i> Berhasil!';
                    btn.style.background = '#16a34a';
                    setTimeout(() => {
                        window.location.href = '/auth/login.html';
                    }, 1800);
                } else {
                    showAlert('error', data.message || 'Pendaftaran gagal. Coba lagi.');
                    btn.disabled = false;
                    btn.innerHTML = '<i class="ti ti-user-plus"></i> Daftar Sekarang';
                }
            } catch (e) {
                showAlert('error', 'Gagal terhubung ke server. Pastikan server berjalan.');
                btn.disabled = false;
                btn.innerHTML = '<i class="ti ti-user-plus"></i> Daftar Sekarang';
            }
        }

        // Enter key support
        document.addEventListener('keydown', (e) => {
            if (e.key === 'Enter') doRegister();
        });
    </script>

    <style>
        @keyframes spin {
            to {
                transform: rotate(360deg);
            }
        }
    </style>
</body>

</html>
